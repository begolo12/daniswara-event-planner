services:
  - type: web
    name: daniswara-event-server
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm run render-start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: daniswara-db
          property: connectionString
      - key: DB_DIALECT
        value: postgres
      - key: CLIENT_URL
        value: https://client-delta-swart-37.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: AI_PROVIDER
        sync: false
      - key: AI_BASE_URL
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        sync: false
      - key: AI_ENCRYPTION_KEY
        sync: false

databases:
  - name: daniswara-db
    plan: free
    databaseName: daniswara_event
    ipAllowList: []
